<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wazup</title>
  <script>
    window.__FLAVORS = [
      { logo: "'Snah', sans-serif", body: "'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif", files: ["/fonts/snah.woff2", "/fonts/hkgrotesk.woff2"] },
      { logo: "'Ruff Cut Jagged', sans-serif", body: "'Keiner', sans-serif", files: ["/fonts/ruffcut.woff2", "/fonts/keiner.woff2"] },
      { logo: "'Luckybones', sans-serif", body: "'Jellee', sans-serif", files: ["/fonts/luckybones.woff2", "/fonts/jellee.woff2"] },
      { logo: "'Illuma', sans-serif", body: "'Now', sans-serif", files: ["/fonts/illuma.woff2", "/fonts/now.woff2"] }
    ];
    !function(){try{
      var f=window.__FLAVORS;
      var i=Math.floor(Number(localStorage.getItem('flavor')||0))%f.length;
      if(!(i>=0))i=0;
      var v=f[i];
      document.documentElement.style.setProperty('--font-logo',v.logo);
      document.documentElement.style.setProperty('--font',v.body);
      document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'berkeley');
      v.files.concat('/fonts/berkeley.woff2').forEach(function(h){
        var l=document.createElement('link');
        l.rel='preload';l.href=h;l.as='font';l.type='font/woff2';l.crossOrigin='';
        document.head.appendChild(l);
      });
    }catch(e){}}()
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
